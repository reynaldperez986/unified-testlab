{% extends "db/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
        <section class="section-card form-card login-card">
            <p class="eyebrow mb-2">Welcome Back</p>
            <h1 class="page-title h3 mb-2">Sign In</h1>
            <p class="subtitle mb-4">Access your validation workspace and execution history.</p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="field-wrap">
                    <label class="field-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <small class="field-error">{{ error }}</small>
                    {% endfor %}
                </div>
            {% endfor %}
            <button class="btn btn-primary w-100 mt-2" type="submit">Sign In</button>
        </form>
        </section>
    </div>
</div>
{% endblock %}
