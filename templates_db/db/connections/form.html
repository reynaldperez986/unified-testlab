{% extends "db/base.html" %}

{% block content %}
<section class="form-shell mx-auto">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="page-title h3 mb-0">{{ title }}</h1>
        <a class="btn btn-outline-secondary" href="/db-lab/connections/">Back</a>
    </div>
    <form method="post" class="section-card form-card">
        {% csrf_token %}
        {% for field in form %}
            <div class="field-wrap">
                <label class="field-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <small class="field-help">{{ field.help_text }}</small>
                {% endif %}
                {% for error in field.errors %}
                    <small class="field-error">{{ error }}</small>
                {% endfor %}
            </div>
        {% endfor %}
        <div class="d-flex justify-content-end gap-2 mt-3">
            <button id="btnTestConn" class="btn btn-outline-primary" type="button"
                data-test-url="{% if is_edit and connection %}/db-lab/connections/{{ connection.id }}/test/{% else %}/db-lab/connections/test-form/{% endif %}">
                <span id="btnTestConnSpinner" class="spinner-border spinner-border-sm d-none me-1" role="status" aria-hidden="true"></span>
                Test Connection
            </button>
            <button class="btn btn-primary" type="submit">Save Connection</button>
        </div>
        <div id="connTestResult" class="mt-3 d-none alert" role="alert"></div>
    </form>
</section>
<script>
(function () {
    var btn = document.getElementById('btnTestConn');
    if (!btn) return;
    btn.addEventListener('click', function () {
        var form = btn.closest('form');
        var spinner = document.getElementById('btnTestConnSpinner');
        var result = document.getElementById('connTestResult');
        var url = btn.dataset.testUrl;
        var data = new FormData(form);
        btn.disabled = true;
        spinner.classList.remove('d-none');
        result.className = 'mt-3 d-none alert';
        fetch(url, {
            method: 'POST',
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            body: data
        })
        .then(function (r) { return r.json(); })
        .then(function (json) {
            result.classList.remove('d-none');
            result.classList.add(json.ok ? 'alert-success' : 'alert-danger');
            result.textContent = json.detail;
        })
        .catch(function () {
            result.classList.remove('d-none');
            result.classList.add('alert-danger');
            result.textContent = 'Request failed. Please try again.';
        })
        .finally(function () {
            btn.disabled = false;
            spinner.classList.add('d-none');
        });
    });
}());
</script>
{% endblock %}
