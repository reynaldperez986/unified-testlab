<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#12304d" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#061220" media="(prefers-color-scheme: dark)">
  <title>Login — WebConX Automation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script>
    (function(){
      var t = localStorage.getItem('uiTheme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', t);
      document.documentElement.classList.toggle('ui-dark', t === 'dark');
    })();
  </script>
  <style>
    :root {
      --login-bg-from:   #dbeeff;
      --login-bg-to:     #eef4fb;
      --login-card-bg:   rgba(255,255,255,.88);
      --login-border:    rgba(37,97,156,.14);
      --login-text:      #17324f;
      --login-muted:     #5f7890;
      --login-input-bg:  rgba(255,255,255,.92);
      --login-shadow:    0 28px 70px rgba(18,52,90,.18), 0 8px 22px rgba(18,52,90,.1);
    }
    html.ui-dark {
      --login-bg-from:   #091828;
      --login-bg-to:     #0d1f35;
      --login-card-bg:   rgba(16,30,50,.92);
      --login-border:    rgba(125,196,255,.18);
      --login-text:      #e7f0fb;
      --login-muted:     #8faec8;
      --login-input-bg:  rgba(9,18,31,.88);
      --login-shadow:    0 28px 70px rgba(0,0,0,.42), 0 8px 22px rgba(0,0,0,.24);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, .75rem) env(safe-area-inset-right, .75rem) env(safe-area-inset-bottom, .75rem) env(safe-area-inset-left, .75rem);
      background:
        radial-gradient(ellipse at top left,  rgba(66,170,255,.22) 0%, transparent 38%),
        radial-gradient(ellipse at top right, rgba(255,200,90,.14)  0%, transparent 32%),
        radial-gradient(ellipse at bottom,    rgba(31,111,182,.12)  0%, transparent 42%),
        linear-gradient(160deg, var(--login-bg-from) 0%, var(--login-bg-to) 100%);
      color: var(--login-text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
    }

    /* Subtle animated orbs behind the card */
    body::before, body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: .55;
    }
    body::before {
      width: min(420px, 90vw); height: min(420px, 90vw);
      top: -10vh; left: -8vw;
      background: radial-gradient(circle, rgba(42,110,168,.28), transparent 62%);
      animation: orbFloat 9s ease-in-out infinite alternate;
    }
    body::after {
      width: min(320px, 70vw); height: min(320px, 70vw);
      bottom: -8vh; right: -6vw;
      background: radial-gradient(circle, rgba(255,175,66,.22), transparent 62%);
      animation: orbFloat 11s ease-in-out infinite alternate-reverse;
    }
    @keyframes orbFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(2vw, 3vh) scale(1.06); }
    }

    /* ── Card ─────────────────────────────────────────────── */
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--login-card-bg);
      border: 1px solid var(--login-border);
      border-radius: 1.5rem;
      box-shadow: var(--login-shadow);
      backdrop-filter: blur(18px) saturate(1.1);
      padding: 2.2rem 2rem 1.8rem;
      overflow: hidden;
      position: relative;
    }

    /* Top gleam */
    .login-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.7) 40%, rgba(255,255,255,.7) 60%, transparent);
      pointer-events: none;
    }

    /* ── Brand ────────────────────────────────────────────── */
    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      margin-bottom: 1.6rem;
    }
    .login-brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 3rem;
      height: 3rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, #2a6ea8 0%, #18476f 100%);
      box-shadow: 0 10px 24px rgba(24,71,111,.32);
      color: #fff;
      font-size: 1.4rem;
    }
    .login-brand-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.1;
    }
    .login-brand-title {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -.025em;
      color: var(--login-text);
    }
    .login-brand-title .bx {
      font-size: 1.45em;
      font-weight: 900;
      color: #ff6b1a;
      line-height: 1;
      display: inline-block;
      animation: xPulse 2.6s ease-in-out infinite;
    }
    .login-brand-sub {
      font-size: .72rem;
      color: var(--login-muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 600;
    }
    @keyframes xPulse {
      0%,100% { text-shadow: 0 0 6px rgba(255,107,26,.5); transform: scale(1); }
      50%      { text-shadow: 0 0 18px rgba(255,107,26,.9); transform: scale(1.14); }
    }

    /* ── Form ─────────────────────────────────────────────── */
    .login-label {
      display: block;
      font-size: .8rem;
      font-weight: 700;
      color: var(--login-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .38rem;
    }
    .login-input-wrap {
      position: relative;
      margin-bottom: 1.1rem;
    }
    .login-input {
      width: 100%;
      background: var(--login-input-bg);
      border: 1.5px solid var(--login-border);
      border-radius: .75rem;
      padding: .72rem 2.6rem .72rem .9rem;
      font-size: .95rem;
      color: var(--login-text);
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .login-input:focus {
      border-color: rgba(42,110,168,.52);
      box-shadow: 0 0 0 3px rgba(42,110,168,.12);
    }
    .login-input::placeholder { color: rgba(95,120,144,.55); }
    .login-input-icon {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--login-muted);
      font-size: .95rem;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      line-height: 1;
      opacity: .7;
      transition: opacity .15s;
    }
    .login-input-icon:hover { opacity: 1; }

    .login-btn {
      width: 100%;
      padding: .82rem;
      border: none;
      border-radius: .88rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      background: linear-gradient(135deg, #2a6ea8 0%, #1a5a97 60%, #134880 100%);
      color: #fff;
      box-shadow: 0 12px 28px rgba(26,90,151,.34);
      transition: transform .15s ease, box-shadow .15s ease;
      margin-top: .35rem;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 36px rgba(26,90,151,.44);
    }
    .login-btn:active { transform: translateY(0); }

    /* ── Error ────────────────────────────────────────────── */
    .login-alert {
      padding: .6rem .9rem;
      border-radius: .75rem;
      background: rgba(220,53,69,.1);
      border: 1px solid rgba(220,53,69,.22);
      color: #9b1c2c;
      font-size: .85rem;
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    html.ui-dark .login-alert { background: rgba(255,100,100,.12); border-color: rgba(255,100,100,.28); color: #ffb4b4; }

    /* ── Footer link ──────────────────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 1.2rem;
      font-size: .83rem;
      color: var(--login-muted);
    }
    .login-footer a {
      color: #2a6ea8;
      text-decoration: none;
      font-weight: 600;
      transition: color .15s;
    }
    .login-footer a:hover { color: #1a5a97; }
    html.ui-dark .login-footer a { color: #7dc4ff; }

    /* ── Theme toggle ─────────────────────────────────────── */
    .login-theme-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: .6rem;
      color: #5f7890;
      padding: .38rem .55rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      font-size: .85rem;
      transition: background .15s;
      z-index: 10;
    }
    .login-theme-btn:hover { background: rgba(255,255,255,.32); }
    html.ui-dark .login-theme-btn { color: #b8d8f5; border-color: rgba(125,196,255,.24); background: rgba(0,0,0,.22); }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .login-card { padding: 1.7rem 1.35rem 1.5rem; border-radius: 1.2rem; }
      .login-brand-icon { width: 2.6rem; height: 2.6rem; font-size: 1.2rem; border-radius: .85rem; }
      .login-brand-title { font-size: 1.18rem; }
    }
  </style>
</head>
<body>

<button class="login-theme-btn" id="loginThemeBtn" title="Toggle dark/light">
  <i class="bi bi-moon-stars-fill" id="loginThemeIcon"></i>
</button>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-brand">
      <div class="login-brand-icon">
        <i class="bi bi-record-circle"></i>
      </div>
      <div class="login-brand-text">
        <div class="login-brand-title">WebCon<span class="bx">X</span></div>
        <div class="login-brand-sub">Automation Platform</div>
      </div>
    </div>

    {% if form.errors %}
    <div class="login-alert">
      <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
      Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="post" autocomplete="on">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <label class="login-label" for="id_username">Username</label>
      <div class="login-input-wrap">
        <input type="text" id="id_username" name="username" class="login-input"
               placeholder="Enter your username" autofocus required autocomplete="username">
        <i class="bi bi-person login-input-icon" style="pointer-events:none;"></i>
      </div>

      <label class="login-label" for="id_password">Password</label>
      <div class="login-input-wrap">
        <input type="password" id="id_password" name="password" class="login-input"
               placeholder="Enter your password" required autocomplete="current-password">
        <button type="button" class="login-input-icon" id="pwToggle" title="Show/hide password"
                style="pointer-events:auto;">
          <i class="bi bi-eye" id="pwIcon"></i>
        </button>
      </div>

      <button type="submit" class="login-btn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="login-footer">
      <i class="bi bi-person-plus me-1"></i>
      <a href="{% url 'create_user' %}">Create a new account</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Show/hide password
  document.getElementById('pwToggle').addEventListener('click', function() {
    var inp  = document.getElementById('id_password');
    var icon = document.getElementById('pwIcon');
    var show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
  });

  // Theme toggle
  function applyLoginTheme(t) {
    var dark = t === 'dark';
    document.documentElement.setAttribute('data-bs-theme', t);
    document.documentElement.classList.toggle('ui-dark', dark);
    document.getElementById('loginThemeIcon').className = dark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
    localStorage.setItem('uiTheme', t);
  }
  applyLoginTheme(localStorage.getItem('uiTheme') || 'light');
  document.getElementById('loginThemeBtn').addEventListener('click', function() {
    applyLoginTheme(localStorage.getItem('uiTheme') === 'dark' ? 'light' : 'dark');
  });
</script>
</body>
</html>
